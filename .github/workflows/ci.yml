name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  lint-and-syntax:
    name: Lint and syntax checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install lint tooling
        run: |
          python -m pip install --upgrade pip
          pip install ruff

      - name: Ruff lint
        run: |
          ruff check \
            main_back.py \
            ObjectClear \
            fluxquantinpaint \
            lora_finetune \
            "move+seg"

      - name: Python syntax compile check
        run: |
          python -m compileall \
            -q \
            main_back.py \
            ObjectClear \
            fluxquantinpaint \
            lora_finetune \
            "move+seg"
